name: Create V1.0 release

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  release:
    if: github.event.head_commit.message == 'Create V1.0 release'
    runs-on: ubuntu-latest
    steps:
      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          if gh release view V1.0 --repo "$GITHUB_REPOSITORY" >/dev/null 2>&1; then
            echo "Release V1.0 already exists."
            exit 0
          fi

          gh release create V1.0 \
            --repo "$GITHUB_REPOSITORY" \
            --target 5457cb6bb1dfb3dc320cab1cf3ed7531e15843ea \
            --title "V1.0" \
            --notes "Initial public release of NaviClean. The Unraid template pulls ghcr.io/thedinz/naviclean:latest, which has been published from the aligned main/dev code."
